<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2a3f"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Sfondo scuro -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#bgGrad)"/>

  <!-- Scritta -->
  <text x="50" y="52"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="700"
        fill="url(#flowGrad)"
        letter-spacing="1">
    FLUXO
  </text>

  <!-- Linea flusso -->
  <path d="M20 65 C30 50, 50 50, 60 65 S80 80, 85 65"
        stroke="url(#flowGrad)"
        stroke-width="3.5"
        fill="none"
        stroke-linecap="round"/>

  <!-- Nodi -->
  <circle cx="20" cy="65" r="3" fill="#3b82f6"/>
  <circle cx="60" cy="65" r="3" fill="#22d3ee"/>
  <circle cx="85" cy="65" r="3" fill="#3b82f6"/>
</svg>
