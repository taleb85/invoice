<svg viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <style>
      .text { font-family: Arial, Helvetica, sans-serif; font-weight: 700; }
      .title { font-size: 42px; fill: url(#textGrad); }
      .subtitle { font-size: 14px; fill: #94a3b8; }
      @media (prefers-color-scheme: dark) {
        .subtitle { fill: #cbd5f5; }
      }
    </style>
  </defs>

  <!-- Icona -->
  <g transform="translate(20,20)">
    <rect x="0" y="20" width="50" height="50" rx="12" fill="url(#grad)" opacity="0.2"/>
    <path d="M10 45 C20 25, 40 25, 50 45 S80 65, 90 45"
          stroke="url(#grad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="10" cy="45" r="4" fill="#3b82f6"/>
    <circle cx="50" cy="45" r="4" fill="#22d3ee"/>
    <circle cx="90" cy="45" r="4" fill="#3b82f6"/>
  </g>

  <!-- Testo -->
  <text x="130" y="70" class="text title">FLUXO</text>
  <text x="132" y="95" class="text subtitle">Invoice Management</text>
</svg>
